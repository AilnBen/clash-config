name: Update freecloud nodes daily

on:
  schedule:
    # Run every day at 06:00 UTC (14:00 Beijing time)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-freecloud:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update freecloud URL with today's nodes
        run: |
          # Get today's date in YYYYMMDD format
          TODAY=$(date -u +%Y%m%d)
          NEW_URL="https://raw.githubusercontent.com/free-nodes/clashfree/main/clash${TODAY}.yml"

          echo "Updating freecloud URL to: ${NEW_URL}"

          # Replace the freecloud URL in config.yaml using sed
          # Matches the line with freecloud's url field and replaces it
          sed -i "/^  freecloud:$/,/^  [a-zA-Z]/ s|^\(    url: \)\".*\"|\1\"${NEW_URL}\"|" config.yaml

          # Verify the change
          echo "--- Updated freecloud section ---"
          grep -A 1 "freecloud:" config.yaml | head -5

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update freecloud nodes for $(date -u +%Y-%m-%d)"
            git push
          fi
